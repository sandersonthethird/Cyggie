appId: com.cyggie.app
productName: Cyggie
copyright: Copyright 2026

directories:
  buildResources: build
  output: dist

extraResources:
  - from: src/main/logo.png
    to: logo.png
  # Square PNG app icon, set on the Dock at runtime via app.dock.setIcon().
  # PNG (not .icns) because nativeImage can't decode .icns on macOS.
  - from: build/icon.png
    to: icon.png
  # macOS-only Swift helper that detects when the meeting app releases the mic
  # (call ended) so recording stops instantly. Built by build-native-helper.mjs
  # (universal) before packaging; resolved at runtime via process.resourcesPath.
  - from: native/meeting-audio-watch/meeting-audio-watch
    to: meeting-audio-watch

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!electron.vite.config.*'
  # Phase 0.1.5: ensure shared workspaces are bundled with the desktop binary.
  # packages/* contain code consumed by src/main (LLM, recording, db, shared types).
  - 'packages/*/src/**/*'
  - 'packages/*/package.json'
  # Mobile + gateway are independent workspaces — never bundle them in the desktop.
  - '!mobile/**/*'
  - '!api-gateway/**/*'

# Custom URL scheme registration for the gateway OAuth callback. Both
# macOS LaunchServices and Windows shell wire cyggie-desktop:// URLs to
# this app. Handled in src/main/index.ts via open-url + second-instance.
protocols:
  - name: Cyggie Desktop
    schemes:
      - cyggie-desktop

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
