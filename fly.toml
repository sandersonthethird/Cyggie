# Fly.io app configuration for the Cyggie gateway.
# App name reserved globally — change here if `flyctl apps create` rejects it.
app = "cyggie-gateway"
primary_region = "iad"  # us-east — colocates with the Neon project in us-east-1

[build]
  dockerfile = "Dockerfile"
  # Build context is the repo root so the Dockerfile can COPY workspace
  # manifests + packages/.
  ignorefile = ".dockerignore"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8443"
  LOG_LEVEL = "info"
  MOBILE_DEEP_LINK_BASE = "cyggie://auth-callback"

[http_service]
  internal_port = 8443
  force_https = true
  # Beta cost profile: machines auto-stop when idle; one wakes on incoming
  # request (~1s cold start). Bump min_machines_running when traffic
  # justifies always-on.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
